<!doctype html>

<html>
  <head>
    <title>Flexbox</title>
    <style>
      .box {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100px;
        height: 100px;
        border: 1px solid black;
      }
      .container {
        display: flex;
        flex-direction: row;
        gap: 16px;
        padding: 20px;
      }
      .box-1 {
        background: red;
        flex-grow: 2;
      }
      .box-2 {
        background: yellow;
      }
      .box-3 {
        background: green;
      }
      .box-4 {
        background: blue;
        flex-grow: 2;
      }
      .box-5 {
        background: purple;
      }
    </style>
  </head>
  <body>
    <div style="display: flex; justify-content: center; flex-direction: column">
      <div class="container">
        <div class="box box-1">1</div>
        <div class="box box-2">2</div>
      </div>
      <div class="container">
        <div class="box box-3">3</div>
        <div class="box box-4">4</div>
        <div class="box box-5">5</div>
      </div>
    </div>
  </body>
</html>
